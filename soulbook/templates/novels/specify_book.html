{% extends "main.html" %}

{% block header %}
<title>{{ title }}</title>
<link rel="stylesheet" href="static/novels/css/result.css">
<style>
    .specify-form { max-width: 720px; margin: 30px auto; }
    .specify-form .form-group { margin-bottom: 16px; }
    .specify-form .help { color: #888; font-size: 12px; }
    .specify-actions { text-align: right; }
</style>
{% endblock %}

{% block content %}
{% include "search_bar.html" %}
<div class="container">
    <form class="specify-form" action="/chapter" method="get">
        <div class="form-group">
            <label for="novels_name">书籍名</label>
            <input type="text" class="form-control" id="novels_name" name="novels_name" placeholder="请输入书籍名" required>
            <div class="help">例如：三体、雪中悍刀行</div>
        </div>
        <div class="form-group">
            <label for="url">目录地址</label>
            <input type="url" class="form-control" id="url" name="url" placeholder="请输入目录页URL" required>
            <div class="help">填入该书的目录页面链接，如 https://example.com/book/123/</div>
        </div>
        <div class="specify-actions">
            <button type="submit" class="btn btn-primary">确认</button>
        </div>
    </form>
</div>
{% endblock %}

{% block script %}
{% endblock %}
